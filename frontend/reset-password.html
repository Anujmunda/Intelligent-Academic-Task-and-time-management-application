<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Academic Task Manager</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Reset Password</h1>
        <p>Enter your new password to finish account recovery</p>
      </div>

      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" class="form-input" minlength="6" required>
        </div>

        <div class="form-group">
          <label for="confirmNewPassword">Confirm Password</label>
          <input type="password" id="confirmNewPassword" class="form-input" minlength="6" required>
        </div>

        <button type="submit" class="btn btn-primary">Update Password</button>
      </form>

      <div class="auth-footer">
        Remembered your password? <a href="index.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
